info:
  name: Airports Grouped by Country
  type: http
  seq: 13

http:
  method: GET
  url: "{{base_url}}/api/airports/grouped?by=country"
  params:
    - name: by
      value: country
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 200", () => expect(res.getStatus()).to.equal(200));
        test("Returns array", () => expect(res.getBody()).to.be.an('array'));
        test("Each group has 'group' and 'airports' fields", () => {
            res.getBody().forEach(g => {
                expect(g.group).to.be.a('string');
                expect(g.airports).to.be.an('array');
            });
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
