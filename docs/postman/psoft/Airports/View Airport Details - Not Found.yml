info:
  name: View Airport Details - Not Found
  type: http
  seq: 5

http:
  method: GET
  url: "{{base_url}}/api/airports/ZZZ"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 404", () => expect(res.getStatus()).to.equal(404));
        test("Has error message", () => expect(res.getBody().message).to.be.a('string'));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
