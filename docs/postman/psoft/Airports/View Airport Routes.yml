info:
  name: View Airport Routes
  type: http
  seq: 10

http:
  method: GET
  url: "{{base_url}}/api/airports/{{airport_iata}}/routes"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 200", () => expect(res.getStatus()).to.equal(200));
        test("Returns array", () => expect(res.getBody()).to.be.an('array'));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
