info:
  name: Register Airport (with facilities)
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/api/airports"
  body:
    type: json
    data: "{\r

      \    \"iataCode\": \"LIS\",\r

      \    \"name\": \"Humberto Delgado Airport\",\r

      \    \"city\": \"Lisbon\",\r

      \    \"country\": \"Portugal\",\r

      \    \"region\": \"Europe\",\r

      \    \"timezone\": \"Europe/Lisbon\",\r

      \    \"latitude\": 38.7813,\r

      \    \"longitude\": -9.1359,\r

      \    \"runways\": [\r

      \        {\r

      \            \"name\": \"03/21\",\r

      \            \"length\": 3805,\r

      \            \"orientation\": \"030/210\"\r

      \        },\r

      \        {\r

      \            \"name\": \"17/35\",\r

      \            \"length\": 2400,\r

      \            \"orientation\": \"170/350\"\r

      \        }\r

      \    ],\r

      \    \"imagePath\": \"images/lis.png\",\r

      \    \"operationalHours\": \"00:00-23:59\",\r

      \    \"services\": [\"Parking\", \"Car Rental\", \"Restaurants\", \"Duty Free\"],\r

      \    \"terminals\": [\"Terminal 1\", \"Terminal 2\"],\r

      \    \"gates\": [\"A1\", \"A2\", \"B1\", \"B2\", \"C1\"]\r

      }"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 201", () => expect(res.getStatus()).to.equal(201));
        test("Has IATA code", () => expect(res.getBody().iataCode).to.exist);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
