info:
  name: Search Airports by City
  type: http
  seq: 6

http:
  method: GET
  url: "{{base_url}}/api/airports/search?city=Porto"
  params:
    - name: city
      value: Porto
      type: query
    - name: name
      value: ""
      type: query
      disabled: true
    - name: country
      value: ""
      type: query
      disabled: true
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 200", () => expect(res.getStatus()).to.equal(200));
        test("Returns array", () => expect(res.getBody()).to.be.an('array'));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
