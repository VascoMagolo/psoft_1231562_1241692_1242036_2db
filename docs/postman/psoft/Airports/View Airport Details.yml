info:
  name: View Airport Details
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/api/airports/{{airport_iata}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 200", () => expect(res.getStatus()).to.equal(200));
        test("Has IATA code", () => expect(res.getBody().iataCode).to.exist);
        test("Has runways", () => expect(res.getBody().runways).to.be.an('array').that.is.not.empty);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
