info:
  name: Busiest Airports Statistics
  type: http
  seq: 11

http:
  method: GET
  url: "{{base_url}}/api/airports/statistics/busiest"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 200", () => expect(res.getStatus()).to.equal(200));
        test("Returns array", () => expect(res.getBody()).to.be.an('array'));
        test("Each entry has iataCode and routeCount", () => {
            res.getBody().forEach(entry => {
                expect(entry.iataCode).to.be.a('string');
                expect(entry.routeCount).to.be.a('number');
            });
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
