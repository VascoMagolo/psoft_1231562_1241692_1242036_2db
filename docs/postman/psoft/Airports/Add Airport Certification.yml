info:
  name: Add Airport Certification
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/airports/{{airport_iata}}/certifications"
  body:
    type: json
    data: "{\r

      \    \"aircraftModelId\": {{aircraft_model_id}}\r

      }"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 201", () => expect(res.getStatus()).to.equal(201));
        test("Has ID", () => expect(res.getBody().id).to.exist);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
