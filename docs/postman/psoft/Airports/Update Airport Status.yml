info:
  name: Update Airport Status
  type: http
  seq: 8

http:
  method: PATCH
  url: "{{base_url}}/api/airports/{{airport_iata}}/status"
  body:
    type: json
    data: "{\r\n    \"status\": \"CLOSED\"\r\n}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 200", () => expect(res.getStatus()).to.equal(200));
        test("Status updated", () => expect(res.getBody().status).to.equal("CLOSED"));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
