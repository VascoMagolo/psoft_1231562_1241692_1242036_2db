info:
  name: Register Airport
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/api/airports"
  body:
    type: json
    data: "{\r

      \    \"iataCode\": \"OPO\",\r

      \    \"name\": \"Francisco Sá Carneiro Airport\",\r

      \    \"city\": \"Porto\",\r

      \    \"country\": \"Portugal\",\r

      \    \"region\": \"Europe\",\r

      \    \"timezone\": \"Europe/Lisbon\",\r

      \    \"latitude\": 41.2481,\r

      \    \"longitude\": -8.6814,\r

      \    \"runways\": [\r

      \        {\r

      \            \"name\": \"03/21\",\r

      \            \"length\": 3480,\r

      \            \"orientation\": \"030/210\"\r

      \        }\r

      \    ]\r

      }"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 201", () => expect(res.getStatus()).to.equal(201));
        test("Has IATA code", () => expect(res.getBody().iataCode).to.exist);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
