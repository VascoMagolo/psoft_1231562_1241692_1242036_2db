info:
  name: Register User
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/api/auth/register"
  body:
    type: json
    data: "{\r

      \    \"username\": \"admin\",\r

      \    \"password\": \"admin123\",\r

      \    \"role\": \"ADMIN\"\r

      }"

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 200", () => expect(res.getStatus()).to.equal(200));
        test("Token received", () => expect(res.getBody().token).to.be.a('string'));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
