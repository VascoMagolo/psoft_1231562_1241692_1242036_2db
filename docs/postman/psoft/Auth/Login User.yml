info:
  name: Login User
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/api/auth/login"
  body:
    type: json
    data: "{\r

      \    \"username\": \"admin\",\r

      \    \"password\": \"admin123\"\r

      }"

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 200", () => expect(res.getStatus()).to.equal(200));
        var jsonData = res.getBody();
        test("Token received", () => expect(jsonData.token).to.be.a('string'));
        if (jsonData.token) {
            bru.setVar("jwt_token", jsonData.token);
            console.log("Token saved successfully.");
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
