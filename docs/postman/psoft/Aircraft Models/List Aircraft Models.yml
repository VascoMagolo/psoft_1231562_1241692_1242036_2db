info:
  name: List Aircraft Models
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/aircraftModels"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 200", () => expect(res.getStatus()).to.equal(200));
        test("Returns array", () => expect(res.getBody()).to.be.an('array'));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
