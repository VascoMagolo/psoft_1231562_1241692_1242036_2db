info:
  name: Register Aircraft Model
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/api/aircraftModels"
  body:
    type: json
    data: "{\r

      \    \"modelName\": \"Boeing 737 MAX\",\r

      \    \"manufacturer\": \"Boeing\",\r

      \    \"fuelCapacity\": 25941.0,\r

      \    \"maxRange\": 6570.0,\r

      \    \"cruisingSpeed\": 839.0,\r

      \    \"imagePath\": \"images/b737max.png\"\r

      }"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 201", () => expect(res.getStatus()).to.equal(201));
        var jsonData = res.getBody();
        test("Model has ID", () => expect(jsonData.id).to.exist);
        if (jsonData.id) {
            bru.setVar("aircraft_model_id", String(jsonData.id));
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
