opencollection: 1.0.0

info:
  name: psoft

request:
  auth:
    type: bearer
    token: "{{jwt_token}}"
  variables:
    - name: base_url
      value: http://localhost:8080
    - name: jwt_token
      value: ""
    - name: aircraft_model_id
      value: "1"
    - name: aircraft_registration
      value: CS-TPA
    - name: airport_iata
      value: OPO
  scripts:
    - type: before-request
      code: |-
        var token = bru.getVar('jwt_token');
        if (token) {
            req.getHeaders().upsert({ key: 'Authorization', value: 'Bearer ' + token });
        }
bundled: false
extensions:
  ignore:
    - node_modules
    - .git
