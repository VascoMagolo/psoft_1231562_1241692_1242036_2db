info:
  name: Search Aircraft
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/api/aircrafts/search?status=AVAILABLE"
  params:
    - name: status
      value: AVAILABLE
      type: query
    - name: modelId
      value: ""
      type: query
      disabled: true
    - name: year
      value: ""
      type: query
      disabled: true
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 200", () => expect(res.getStatus()).to.equal(200));
        test("Returns array", () => expect(res.getBody()).to.be.an('array'));
        test("All results match status filter", () => {
            res.getBody().forEach(a => expect(a.status).to.equal("AVAILABLE"));
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
