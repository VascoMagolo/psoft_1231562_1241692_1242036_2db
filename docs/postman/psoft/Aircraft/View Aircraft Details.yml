info:
  name: View Aircraft Details
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/aircrafts/{{aircraft_registration}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 200", () => expect(res.getStatus()).to.equal(200));
        test("Registration matches", () => expect(res.getBody().registrationNumber).to.equal(bru.getVar("aircraft_registration")));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
